name: artifacts

on:
  push:
    branches: [ "main" ]

jobs:
  upload:
    runs-on: ubuntu-latest

    outputs:
      upload_outputs: ${{ steps.generatefile.outputs.status_msg }}


    steps:
      - id: generatefile
        run: |
          echo "_____New_file____" > test.txt
          echo "timestamp-$(date)" >> test.txt
          echo "status-SUCCESS" >> test.txt
          echo "status_msg=File generated successfully" >> "$GITHUB_OUTPUT"

      - name: upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: my-artifact
          path: test.txt
          retention-days: 5

  print:

    runs-on: ubuntu-latest

    needs: upload

    steps:
      - name: uses output from upload
        env:
          my_output: ${{ needs.upload.outputs.upload_outputs }}

        run: echo "$my_output"

