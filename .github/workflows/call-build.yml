name: caller

on:
  push:
    branches: [ "main" ]

jobs:
  token:
    uses: ./.github/workflows/reusable-build.yml

    with:
      app_name: "my-web-app"
      environment: "production"
    secrets:
      docker_token: ${{ secrets.DOCKER_TOKEN }}


  second:
    needs: token
    runs-on: ubuntu-latest

    steps:
      - name: use output from token
        run: echo "${{ needs.token.outputs.my_outputs }}"
