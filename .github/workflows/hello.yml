name: hello
on:
  push:
    branches: [ "main" ]

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: code checkout
        uses: "actions/checkout@v4"

      - name: print hello
        run: echo "Hello from GitHub Actions!"

      - name: Print current date and time
        run: echo $(date)

      - name: branch name
        run: echo "The current branch is ${{ github.ref_name }}"
      
      - name: list files
        run: ls -R

      - name: runners OS
        run: cat /etc/os-release
