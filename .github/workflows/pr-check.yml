name: pull-request

on:
  pull_request:
    branches: [ "main" ]

jobs:
  print:
    runs-on: ubuntu-latest

    steps:
      - name: code checkout
        uses: "actions/checkout@v4"

      - name: prints branch confirmation
        env:
          Branch_name: ${{ github.head_ref }}

        run: echo "PR check running for branch: $Branch_name"
